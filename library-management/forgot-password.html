<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Forgot Password - BookVerse</title>
  <link rel="stylesheet" href="css/forgot-password.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="logo">
      <i class="fas fa-book"></i> BookVerse
    </div>
  </header>

  <!-- Back Button -->
  <button id="backBtn" type="button" onclick="window.location.href='login.html'">
    <i class="fas fa-arrow-left"></i>
  </button>

  <div class="card" role="main" aria-labelledby="title">
    <h2 id="title">Reset Password</h2>

    <!-- Helper text always visible -->
    <p id="helper" class="helper">Enter your registered email to reset your password.</p>

    <input
      id="resetEmail"
      class="email-input"
      type="email"
      placeholder="Enter your email"
      aria-label="Email"
    >

    <button id="resetBtn" class="btn" type="button">Reset Password</button>

    <!-- Messages -->
    <p id="resetError" class="message error" role="alert" style="display:none;"></p>
    <p id="resetSuccess" class="message success" role="status" style="display:none;"></p>
  </div>

  <script type="module">
    import { auth } from "./firebase-config.js";
    import {
      sendPasswordResetEmail
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const resetBtn = document.getElementById("resetBtn");
    const resetEmail = document.getElementById("resetEmail");
    const resetError = document.getElementById("resetError");
    const resetSuccess = document.getElementById("resetSuccess");
    const helper = document.getElementById("helper");

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function showError(msg) {
      resetError.textContent = msg;
      resetError.style.display = "block";
      resetSuccess.style.display = "none";
    }

    function showSuccess(msg) {
      resetSuccess.textContent = msg;
      resetSuccess.style.display = "block";
      resetError.style.display = "none";
    }

    resetBtn.addEventListener("click", async () => {
      // Clear old messages
      resetError.style.display = "none";
      resetSuccess.style.display = "none";
      resetError.textContent = "";
      resetSuccess.textContent = "";

      const email = (resetEmail.value || "").trim();

      // 1️⃣ Empty email
      if (!email) {
        showError("Please enter your email.");
        return;
      }

      // 2️⃣ Invalid format
      if (!isValidEmail(email)) {
        showError("Please enter a valid email address.");
        return;
      }

      // Button loading state
      resetBtn.disabled = true;
      const originalText = resetBtn.textContent;
      resetBtn.textContent = "Sending...";

      try {
        // 3️⃣ Ask Firebase to send reset mail
        await sendPasswordResetEmail(auth, email);

        // Hide helper text, show success
        helper.style.display = "none";
        showSuccess("If this email is registered with BookVerse, a reset link has been sent to your inbox.");

        // Redirect back to login after a short delay
        setTimeout(() => {
          window.location.href = "login.html";
        }, 3500);

      } catch (err) {
        console.error("Password reset error:", err.code, err.message);

        // Some projects still give auth/user-not-found, handle if it comes
        if (err.code === "auth/user-not-found") {
          showError("No account found with this email.");
        } else if (err.code === "auth/invalid-email") {
          showError("Please enter a valid email address.");
        } else {
          showError("Something went wrong. Please try again.");
        }
      } finally {
        resetBtn.disabled = false;
        resetBtn.textContent = originalText;
      }
    });

    // Press Enter to trigger reset
    resetEmail.addEventListener("keydown", (e) => {
      if (e.key === "Enter") resetBtn.click();
    });
  </script>
</body>
</html>
